<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in · Ascendly Lead Enrichment</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#f8f9fa; --panel:#fff; --line:#e9e7f2; --text:#191c1d; --muted:#484555;
    --hint:#797587; --acc:#5f3add; --acc2:#7857f8; --acc-bg:#ece9fd; --acc-tx:#4918c8;
    --red-bg:#ffdad6; --red-tx:#ba1a1a; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Manrope',system-ui,sans-serif;background:
    radial-gradient(1200px 600px at 50% -10%, #efeaff 0%, var(--bg) 55%);
    color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:360px;max-width:92vw;background:var(--panel);border:1px solid var(--line);
    border-radius:18px;padding:30px 28px;box-shadow:0 20px 60px rgba(60,40,140,.12)}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:22px}
  .dot{width:34px;height:34px;border-radius:10px;background:var(--acc);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px}
  .bname{font-size:17px;font-weight:800;color:var(--acc);letter-spacing:-.01em}
  h1{font-size:19px;font-weight:800;margin:0 0 4px;letter-spacing:-.02em}
  p.sub{font-size:13px;color:var(--hint);margin:0 0 20px}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 6px}
  input{width:100%;height:44px;border:1px solid var(--line);border-radius:11px;padding:0 13px;
    font-family:inherit;font-size:14px;background:#fff;color:var(--text)}
  input:focus{outline:none;border-color:var(--acc-br,#cabeff);box-shadow:0 0 0 3px var(--acc-bg)}
  button{width:100%;height:46px;margin-top:18px;border:none;border-radius:11px;background:var(--acc);
    color:#fff;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;
    box-shadow:0 2px 8px rgba(95,58,221,.28);transition:filter .15s}
  button:hover{filter:brightness(1.06)}
  button:disabled{opacity:.6;cursor:default}
  .err{margin-top:14px;font-size:13px;color:var(--red-tx);background:var(--red-bg);
    border-radius:9px;padding:9px 12px;display:none}
  .err.show{display:block}
  .foot{margin-top:18px;font-size:11.5px;color:var(--hint);text-align:center}
</style>
</head>
<body>
  <form class="card" id="loginForm">
    <div class="brand"><span class="dot">A</span><span class="bname">Ascendly</span></div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to the Lead Enrichment workspace.</p>
    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="Enter password" autofocus />
    <button id="btn" type="submit">Sign in</button>
    <div class="err" id="err"></div>
    <div class="foot">Protected workspace · Ascendly</div>
  </form>
<script>
  const form = document.getElementById("loginForm");
  const pw = document.getElementById("pw");
  const btn = document.getElementById("btn");
  const err = document.getElementById("err");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    err.classList.remove("show");
    btn.disabled = true; btn.textContent = "Signing in…";
    try {
      const r = await fetch("/api/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pw.value }),
      });
      if (r.ok) { window.location = "/"; return; }
      const d = await r.json().catch(() => ({}));
      err.textContent = d.detail || "Wrong password";
      err.classList.add("show");
    } catch (_) {
      err.textContent = "Could not reach the server. Try again.";
      err.classList.add("show");
    }
    btn.disabled = false; btn.textContent = "Sign in";
    pw.select();
  });
</script>
</body>
</html>
